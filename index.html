<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap&subset=latin" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-bar">
        <div class="top-left">
            <p class="greeting-text" id="greetingText">Good morning, <span id="userName">Guest</span></p>
            <h1 class="app-title">Mindful To-Do List</h1>
            <p class="subheading">A calm place to focus on the work that matters.</p>
        </div>
        <div class="top-right">
            <div class="progress-ring" role="img" aria-label="Today's completion progress">
                <svg viewBox="0 0 42 42" class="progress-ring__svg" aria-hidden="true">
                    <circle class="progress-ring__bg" cx="21" cy="21" r="18"></circle>
                    <circle class="progress-ring__circle" cx="21" cy="21" r="18"></circle>
                </svg>
                <span class="progress-ring__label" id="completionPercentage">0%</span>
            </div>
            <button id="settingsBtn" class="icon-btn" aria-label="Open settings" title="Open settings">
                <span aria-hidden="true">⚙</span>
            </button>
        </div>
    </div>

    <div class="container">
        <!-- Search & Filter Section -->
        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search tasks..."
                class="search-input"
            >
        </div>

        <!-- Add Task Section -->
        <div class="add-section">
            <div class="input-row">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="What do you want to accomplish?"
                    class="todo-input"
                >
            </div>

            <div class="options-row">
                <select id="categorySelect" class="category-select">
                    <option value="Personal">☀ Personal</option>
                    <option value="Work">⚙ Work</option>
                    <option value="Health">🍃 Health</option>
                    <option value="Shopping">🛍 Shopping</option>
                </select>

                <input 
                    type="date" 
                    id="dueDateInput" 
                    class="date-input"
                >

                <button id="addBtn" class="add-btn">+ Add Task</button>
            </div>
        </div>

        <!-- Category Filter -->
        <div class="category-filter segmented-control">
            <div class="segment-indicator" aria-hidden="true"></div>
            <button class="category-btn active" data-category="All"><span>All</span><span class="count-badge">0</span></button>
            <button class="category-btn" data-category="Personal"><span>Personal</span><span class="count-badge">0</span></button>
            <button class="category-btn" data-category="Work"><span>Work</span><span class="count-badge">0</span></button>
            <button class="category-btn" data-category="Health"><span>Health</span><span class="count-badge">0</span></button>
            <button class="category-btn" data-category="Shopping"><span>Shopping</span><span class="count-badge">0</span></button>
        </div>

        <!-- Current/No Date Tasks -->
        <div class="tasks-section today-card">
            <h3 class="section-title">Your Tasks</h3>
            <ul id="todoList" class="todo-list">
                <!-- Todos will appear here -->
            </ul>
        </div>

        <!-- Upcoming Tasks with Dates -->
        <div class="tasks-section upcoming-card" id="upcomingSection" style="display: none;">
            <h3 class="section-title">Upcoming Tasks for Other Days</h3>
            <div id="upcomingList" class="todo-list upcoming-groups">
                <!-- Upcoming todos will appear here -->
            </div>
        </div>

        <!-- Counter & Actions -->
        <div class="footer-section">
            <p class="todo-counter">
                Total: <span id="totalCount">0</span> | Completed: <span id="doneCount">0</span>
            </p>
            <button id="clearAllBtn" class="clear-all-btn">Clear Completed</button>
        </div>
    </div>

    <button id="addFab" class="fab" aria-label="Add task" title="Add task">+</button>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="settings-options">
                <div class="setting-item">
                    <label for="darkModeToggle">Dark Mode</label>
                    <input type="checkbox" id="darkModeToggle" class="toggle-checkbox">
                </div>
                <div class="setting-item">
                    <button id="changeNameSettingsBtn" class="setting-btn">Change Name</button>
                </div>
            </div>
            <button id="closeSettingsBtn" class="btn-cancel" style="width: 100%; margin-top: 20px;">Close</button>
        </div>
    </div>

    <!-- Welcome Modal -->
    <div id="welcomeModal" class="modal">
        <div class="modal-content welcome-modal">
            <h2>Welcome to Mindful Tasks</h2>
            <p class="welcome-subtitle">What's your name?</p>
            <input type="text" id="nameInput" class="modal-input" placeholder="Enter your name...">
            <button id="startBtn" class="btn-save">Get Started</button>
        </div>
    </div>

    <!-- Change Name Modal -->
    <div id="changeNameModal" class="modal hidden">
        <div class="modal-content">
            <h2>Change Your Name</h2>
            <input type="text" id="newNameInput" class="modal-input" placeholder="Enter your name...">
            <div class="modal-buttons">
                <button id="confirmNameBtn" class="btn-save">Save</button>
                <button id="cancelNameBtn" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <h2>Edit Task</h2>
            <input type="text" id="editTaskText" class="modal-input" placeholder="Task description">
            <select id="editCategory" class="modal-select">
                <option value="Personal">☀ Personal</option>
                <option value="Work">⚙ Work</option>
                <option value="Health">🍃 Health</option>
                <option value="Shopping">🛍 Shopping</option>
            </select>
            <input type="date" id="editDueDate" class="modal-input">
            <div class="modal-buttons">
                <button id="saveEditBtn" class="btn-save">Save</button>
                <button id="cancelEditBtn" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
